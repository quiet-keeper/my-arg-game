<!DOCTYPE html>
<html>
<head>
    <title>ARG — Сцена 1</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: monospace;
            text-align: center;
            padding: 20px;
        }
        #game-box {
            width: 800px;
            margin: 0 auto;
            background: #111;
            padding: 20px;
            border-radius: 10px;
        }
        #scene-image {
            width: 100%;
            border: 2px solid gray;
        }
        button {
            background: #222;
            color: white;
            border: 1px solid white;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="game-box">
    <!-- Сюда будем вставлять картинку -->
    <img id="scene-image" src="" alt="Сцена">
    
    <!-- Сюда будем вставлять текст -->
    <p id="scene-text">Текст появится здесь</p>
    
    <!-- Кнопка для перехода -->
    <button onclick="nextScene()">Дальше</button>
</div>

<script>
    // --- Шаг 1. Список сцен ---
    // У нас будет массив (список) сцен. Каждая сцена — это картинка и текст.
    
    const scenes = [
        { img: "images/darkholl.png", text: "Этот тёмный коридор... не заканчивается" },
        { img: "images/hollandlite.jpg", text: "Кажется, там свет?" }
    ];
    
    // --- Шаг 2. Какая сцена сейчас показывается (номер) ---
    let currentIndex = 0;   // 0 — первая сцена
    
    // --- Шаг 3. Функция, которая показывает текущую сцену ---
    function showScene() {
        // Берём сцену из списка по номеру currentIndex
        const currentScene = scenes[currentIndex];
        
        // Находим элемент <img> с id="scene-image" и меняем его src (путь к картинке)
        document.getElementById("scene-image").src = currentScene.img;
        
        // Находим элемент <p> с id="scene-text" и меняем его текст
        document.getElementById("scene-text").innerText = currentScene.text;
    }
    
    // --- Шаг 4. Функция, которая переключает на следующую сцену ---
    function nextScene() {
        // Увеличиваем номер текущей сцены на 1
        currentIndex = currentIndex + 1;
        
        // Если сцены закончились (номер больше, чем длина списка)
        if (currentIndex >= scenes.length) {
            document.getElementById("scene-text").innerText = "Конец. Начни сначала (обнови страницу)";
            return;  // выходим из функции, дальше не идём
        }
        
        // Показываем новую сцену
        showScene();
    }
    
    // --- Шаг 5. Запускаем игру: показываем первую сцену ---
    showScene();
</script>
</body>
</html>
